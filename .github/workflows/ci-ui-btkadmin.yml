name: CI plugin-btkadmin_ui

on:
  push:
    branches:
      - main
      - debug/frontline
    paths:
      - 'backend/plugins/btkadmin_api/**'
      - 'backend/erxes-api-shared/**'
      - 'frontend/private-plugins/btkadmin_ui/**'
      - 'frontend/libs/**'
      - '.github/workflows/ci-ui-btkadmin.yml'
  pull_request:
    paths:
      - 'backend/plugins/btkadmin_api/**'
      - 'backend/erxes-api-shared/**'
      - 'frontend/private-plugins/btkadmin_ui/**'
      - 'frontend/libs/**'
      - '.github/workflows/ci-ui-btkadmin.yml'

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  btkadmin_ui-ci:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build btk admin UI
        run: |
          export NX_DAEMON=false
          pnpm nx build btkadmin_ui

      - name: Sync to Cloudflare R2
        if: github.event_name == 'push' && ( github.ref == 'refs/heads/main' || github.ref == 'refs/heads/debug/frontline' )
        run: |
          aws s3 sync dist/frontend/private-plugins/btkadmin_ui s3://erxes-next/latest/btkadmin_ui/ \
            --endpoint-url https://7c8392aff8ac4518aa06dfa4b6337ef2.r2.cloudflarestorage.com

  btkadmin_api-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: pnpm install

      - name: Set environment variables
        run: |
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Build shared module
        run: pnpm nx build erxes-api-shared

      - name: Build btkadmin_api
        run: pnpm nx build btkadmin_api

      # Buildx setup
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/debug/core')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (multi-platform)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/debug/core')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/plugins/btkadmin_api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            erxes/erxes-next-btkadmin_api:latest
            erxes/erxes-next-btkadmin_api:${{ env.DATE }}-${{ env.SHORT_SHA }}
