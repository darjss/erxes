name: Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 3.0.4)'
        required: true

jobs:
  tag-docker-images:
    name: Tag ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - erxes/erxes-next-agent_api
          - erxes/erxes-next-block_api
          - erxes/erxes-next-blockadmin_api
          - erxes/erxes-next-btk_api
          - erxes/erxes-next-btkadmin_api
          - erxes/erxes-next-onefit_api
          - erxes/erxes-next-blockagency_api
      fail-fast: false
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag ${{ matrix.image }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          docker buildx imagetools create -t "${{ matrix.image }}:$VERSION" "${{ matrix.image }}:latest"
