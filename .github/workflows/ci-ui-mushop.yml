name: CI plugin-mushop_ui

on:
  push:
    branches:
      - main
      - mushop
    paths:
      - 'frontend/private-plugins/mushop_ui/**'
      - 'frontend/libs/**'
      - '.github/workflows/ci-ui-mushop.yml'
  pull_request:
    paths:
      - 'frontend/private-plugins/mushop_ui/**'
      - 'frontend/libs/**'
      - '.github/workflows/ci-ui-mushop.yml'

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  mushop_ui-ci:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build mushop UI
        run: |
          export NX_DAEMON=false
          pnpm nx build mushop_ui

      - name: Sync to Cloudflare R2
        run: |
          aws s3 sync dist/frontend/private-plugins/mushop_ui s3://erxes-next/latest/mushop_ui/ \
            --endpoint-url https://7c8392aff8ac4518aa06dfa4b6337ef2.r2.cloudflarestorage.com
