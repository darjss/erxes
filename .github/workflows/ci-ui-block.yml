name: CI plugin-block_ui

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]*'
    paths:
      - 'frontend/private-plugins/block_ui/**'
      - 'frontend/libs/**'
      - '.github/workflows/ci-ui-block.yml'
  pull_request:
    paths:
      - 'frontend/private-plugins/block_ui/**'
      - 'frontend/libs/**'
      - '.github/workflows/ci-ui-block.yml'

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  block_ui-ci:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build block UI
        run: |
          export NX_DAEMON=false
          pnpm nx build block_ui

      - name: Sync to Cloudflare R2
        if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) || github.event_name == 'workflow_call'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            FOLDER="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            FOLDER="${{ inputs.version }}"
          else
            FOLDER="latest"
          fi
          aws s3 sync dist/frontend/plugins/sales_ui s3://erxes-next/$FOLDER/sales_ui/ \
            --endpoint-url https://7c8392aff8ac4518aa06dfa4b6337ef2.r2.cloudflarestorage.com
